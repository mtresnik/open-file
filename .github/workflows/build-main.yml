name: Build Main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradle wrapper executable
        if: matrix.os != 'windows-latest'
        run: chmod +x ./gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Smoke-test the native-installer path on every matrix OS so
      # issues with jpackage / packageReleaseDistribution are caught
      # before release time rather than during it. We build the
      # regular (non-release) distribution to keep CI time down —
      # the release variant is only needed for the actual release
      # workflow.
      - name: Package native distribution (${{ matrix.os }})
        run: ./gradlew :desktop-ui:packageDistributionForCurrentOS
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
